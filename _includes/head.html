<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="{{ site.description }}" />
<title>{{ site.data.profile.name }} | Portfolio</title>

<!-- Favicons -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/favicon/apple-touch-icon.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/img/favicon/favicon-32x32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/img/favicon/favicon-16x16.png' | relative_url }}">
<link rel="manifest" href="{{ '/assets/img/favicon/site.webmanifest' | relative_url }}">
<link rel="shortcut icon" href="{{ '/assets/img/favicon/favicon.ico' | relative_url }}">

<!-- FOUC Prevention: inject CSS variables and initial theme before stylesheet loads -->
<style>
  :root {
    --color-primary:   {{ site.data.profile.theme_config.colors.primary   | default: '#0d1117' }};
    --color-secondary: {{ site.data.profile.theme_config.colors.secondary | default: '#161b22' }};
    --color-accent:    {{ site.data.profile.theme_config.colors.accent    | default: '#58a6ff' }};
    
    /* Derived Tokens (Liquid + CSS) */
    --color-accent-subtle: color-mix(in srgb, var(--color-accent) 15%, transparent);
    --color-border-glamour: color-mix(in srgb, var(--color-accent) 25%, var(--color-border, #30363d));
  }
</style>
<script>
  // Apply saved theme preference before any paint to prevent FOUC
  (function() {
    var saved = localStorage.getItem('devfolio-theme');
    var jsonDefault = '{{ site.data.profile.theme_config.mode | default: "dark" }}';
    var theme = saved || jsonDefault;
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>

<!-- Google Fonts: Space Grotesk + Archivo -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<!-- Main Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | prepend: site.baseurl }}" />
