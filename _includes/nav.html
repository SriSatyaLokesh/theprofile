<nav class="nav" role="navigation" aria-label="Main navigation">
  <div class="container nav__inner">
    <a href="{{ '/' | relative_url }}#hero" class="nav__brand">
      {{ site.data.profile.name }}
    </a>

    <ul class="nav__links" role="list" id="nav-links">
      <div class="nav__indicator"></div>
      <li><a href="{{ '/' | relative_url }}#profile"         class="nav__link">About</a></li>
      <li><a href="{{ '/' | relative_url }}#experience"      class="nav__link">Experience</a></li>
      <li><a href="{{ '/' | relative_url }}#education"       class="nav__link">Education</a></li>
      <li><a href="{{ '/' | relative_url }}#skills"          class="nav__link">Skills</a></li>
      <li><a href="{{ '/' | relative_url }}#projects"        class="nav__link">Projects</a></li>
      <li><a href="{{ '/' | relative_url }}#contact"         class="nav__link">Contact</a></li>
      {% if site.data.profile.blog_config.enabled %}
        <li><a href="{{ '/blog/' | relative_url }}" class="nav__link">Blog</a></li>
      {% endif %}
    </ul>

    <div class="nav__actions">
      <!-- Cinematic Sound Toggle -->
      {% if site.data.profile.theme_config.music.enabled %}
      <button
        id="sound-toggle"
        class="nav__sound-toggle"
        onclick="window.toggleSound()"
        aria-label="Toggle background music"
        title="Toggle Sound"
      >
        <div class="wavelength">
          <span class="wavelength__bar"></span>
          <span class="wavelength__bar"></span>
          <span class="wavelength__bar"></span>
          <span class="wavelength__bar"></span>
        </div>
      </button>
      {% endif %}

      <!-- Dark/Light mode toggle -->
      <button
        id="theme-toggle"
        class="nav__theme-toggle"
        aria-label="Toggle dark/light mode"
        title="Toggle theme"
      >
        <!-- Sun icon (light mode) -->
        <svg class="icon icon--sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon icon (dark mode) -->
        <svg class="icon icon--moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <!-- Mobile hamburger -->
      <button
        id="nav-toggle"
        class="nav__hamburger"
        aria-label="Toggle navigation"
        aria-expanded="false"
        aria-controls="nav-links"
      >
        <span class="hamburger__bar"></span>
        <span class="hamburger__bar"></span>
        <span class="hamburger__bar"></span>
      </button>
    </div>
  </div>
</nav>
